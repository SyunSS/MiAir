name: Auto Sync Fork

on:
  schedule:
    # 每 21 分钟自动同步一次（你想频繁点可以改成 21 分钟，稳一点可以改成每小时）
      - cron: '0 1,13 * * *'
  workflow_dispatch:
    inputs:
      sync_test_mode:
        description: '测试模式（不实际写入）'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync from upstream KiriChen-Wind/MiAir

    steps:
      - name: Checkout this fork
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_branch: main
          upstream_sync_repo: KiriChen-Wind/MiAir
          test_mode: ${{ inputs.sync_test_mode }}

      - name: Sync result
        run: |
          if [ "${{ steps.sync.outputs.has_new_commits }}" = "true" ]; then
            echo "✅ 检测到上游有新提交，已自动合并到你的 fork"
          else
            echo "ℹ️  上游暂无新提交，你的 fork 已是最新"
          fi
