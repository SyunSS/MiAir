name: Auto Sync Fork

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      sync_test_mode:
        description: '测试模式（不实际写入）'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync from upstream KiriChen-Wind/MiAir

    steps:
      - name: Checkout this fork
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_branch: main
          upstream_sync_repo: KiriChen-Wind/MiAir
          test_mode: ${{ inputs.sync_test_mode }}

      - name: Sync result
        run: |
          if [ "${{ steps.sync.outputs.has_new_commits }}" = "true" ]; then
            echo "✅ 检测到上游有新提交，已自动合并到你的 fork"
            echo "trigger_build=true" >> $GITHUB_ENV
          else
            echo "ℹ️ 上游暂无新提交，你的 fork 已是最新"
            echo "trigger_build=false" >> $GITHUB_ENV
          fi

      - name: Trigger docker build
        if: env.trigger_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🚀 有新提交，触发自动编译..."
          gh workflow run "Build and Push MiAir Docker Image" --ref main
          echo "✅ 已触发编译工作流"
